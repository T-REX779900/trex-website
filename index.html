<!DOCTYPE html>
<html>
<head>
    <title>T-REX Website</title>

    <!-- 🌐 Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            color: white;
            text-align: center;

            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 🎥 Background Video */
        #bgVideo {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
            filter: brightness(0.5);
        }

        /* 🧑 Profile Photo */
        #profile {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid white;
            cursor: pointer;
            transition: 0.3s;
        }

        /* 🔥 Zoom Effect */
        #profile.active {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(3);
            z-index: 10;
            border: 4px solid white;
        }

        /* 📦 Container */
        .container {
            width: 100%;
            max-width: 700px;
            margin-top: 100px;
        }

        /* 📦 Boxes */
        .box {
            background: rgba(0, 0, 0, 0.7);
            margin: 15px auto;
            padding: 25px;
            width: 80%;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.6);
        }

        .box:hover {
            transform: scale(1.05);
            transition: 0.3s;
        }

        h2 {
            color: #38bdf8;
        }

        a {
            color: #22c55e;
            text-decoration: none;
        }

        /* ⌨️ Typing */
        #typing {
            font-size: 28px;
            margin-bottom: 20px;
        }

    </style>
</head>

<body>

    <!-- 🎥 Video -->
    <video autoplay muted loop id="bgVideo">
        <source src="sky.mp4.mp4" type="video/mp4">
    </video>

    <!-- 🧑 Photo -->
    <img src="trex.jpg" id="profile">

    <!-- 📦 Content -->
    <div class="container">

        <!-- ⌨️ Typing -->
        <h1 id="typing"></h1>

        <!-- 👨‍💻 About -->
        <div class="box">
            <h2>About Me</h2>
            <p>I am T-REX, learning web development and building my future 🚀</p>
        </div>

        <!-- 🧠 Skills -->
        <div class="box">
            <h2>Skills</h2>
            <p>HTML | CSS | JavaScript</p>
        </div>

        <!-- 📩 Contact -->
        <div class="box">
            <h2>Contact</h2>
            <p>Email: 
                <a href="mailto:"t.rex779900@email.com">your@email.com</a>
            </p>
        </div>
        
<div class="box">
<h2>Follow Me</h2>
<p>
<a href="https://instagram.com/t_rex_2032"
target="_blank">Instagram</a>
</p>
</div>
    

    <!-- ⚡ Scripts -->
    <script>
        // Typing
        let text = "🦖 T-REX | Future Developer 🚀";
        let i = 0;

        function typeEffect() {
            if (i < text.length) {
                document.getElementById("typing").innerHTML += text.charAt(i);
                i++;
                setTimeout(typeEffect, 50);
            }
        }
        typeEffect();

        // Zoom Photo
        let profile = document.getElementById("profile");

        profile.onclick = function() {
            profile.classList.toggle("active");
        }
    </script>

</body>
</html>
